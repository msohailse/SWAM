# Hibernate creates/updates the schema to match the entities — fine for this prototype.
quarkus.hibernate-orm.database.generation=update
quarkus.hibernate-orm.log.sql=true

# Allow the Angular dev server (ng serve, default port 4200) to call this API directly.
quarkus.http.cors=true
quarkus.http.cors.origins=/.*/

# Kafka producer: publishes one JSON event per created incident, consumed by
# analyzer_microservice. In dev/test, no bootstrap servers are configured on purpose —
# Quarkus Dev Services auto-starts a throwaway Kafka broker, same as it does for Postgres.
mp.messaging.outgoing.incident-created.topic=incident-created
mp.messaging.outgoing.incident-created.connector=smallrye-kafka
mp.messaging.outgoing.incident-created.value.serializer=org.apache.kafka.common.serialization.StringSerializer

# Kafka consumer (backend's first — until now this service only produced): analyzer_microservice
# reports a duplicate finding here instead of calling a REST endpoint directly.
mp.messaging.incoming.incident-analysis-completed.topic=incident-analysis-completed
mp.messaging.incoming.incident-analysis-completed.connector=smallrye-kafka
mp.messaging.incoming.incident-analysis-completed.value.deserializer=org.apache.kafka.common.serialization.StringDeserializer
mp.messaging.incoming.incident-analysis-completed.auto.offset.reset=earliest

# Seed users (UserSeeder): one known admin + one reporter, created at startup if missing.
# Override via env vars (SEED_ADMIN_EMAIL etc.) — see deploy/.env.example. Off in tests so
# the test suite keeps starting from an empty users table.
seed.enabled=true
%test.seed.enabled=false
seed.admin.email=superadmin@swam.local
seed.admin.password=Admin1234
seed.user.email=user@swam.local
seed.user.password=User12345
# Department-scoped admin (IT Support) — only sees/closes incidents assigned to that
# department, unlike seed.admin above (department left null, i.e. the super admin).
seed.dept-admin.email=it-admin@swam.local
seed.dept-admin.password=ItAdmin123

# Dev and test: no datasource configured on purpose — Quarkus Dev Services auto-starts a
# throwaway Postgres container for both `mvn quarkus:dev` and `mvn test`, so nothing needs
# to be running beforehand and no credentials are needed locally.

# Prod (docker-compose / real deployment): credentials come entirely from env vars,
# nothing hardcoded. See deploy/docker-compose.yml and .env.example.
%prod.quarkus.datasource.db-kind=postgresql
%prod.quarkus.datasource.username=${DB_USER}
%prod.quarkus.datasource.password=${DB_PASSWORD}
%prod.quarkus.datasource.jdbc.url=${DB_URL}
%prod.quarkus.http.host=0.0.0.0
%prod.kafka.bootstrap.servers=${KAFKA_BOOTSTRAP_SERVERS}
