# Hibernate creates/updates the schema to match the entities — fine for this prototype.
quarkus.hibernate-orm.database.generation=update
quarkus.hibernate-orm.log.sql=true

# Allow the Angular dev server (ng serve, default port 4200) to call this API directly.
quarkus.http.cors=true
quarkus.http.cors.origins=/.*/

# Dev and test: no datasource configured on purpose — Quarkus Dev Services auto-starts a
# throwaway Postgres container for both `mvn quarkus:dev` and `mvn test`, so nothing needs
# to be running beforehand and no credentials are needed locally.

# Prod (docker-compose / real deployment): credentials come entirely from env vars,
# nothing hardcoded. See deploy/docker-compose.yml and .env.example.
%prod.quarkus.datasource.db-kind=postgresql
%prod.quarkus.datasource.username=${DB_USER}
%prod.quarkus.datasource.password=${DB_PASSWORD}
%prod.quarkus.datasource.jdbc.url=${DB_URL}
%prod.quarkus.http.host=0.0.0.0
