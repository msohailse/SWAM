<div class="page">
  <h1>Manage Departments (Admin)</h1>

  <form class="create-form" (ngSubmit)="create()">
    <h2>Add New Department</h2>
    <label>
      Name
      <input name="newName" [(ngModel)]="newName" required placeholder="e.g. HR" />
    </label>
    <label>
      Description
      <input name="newDescription" [(ngModel)]="newDescription" placeholder="Optional" />
    </label>
    <button type="submit" class="btn-primary" [disabled]="!newName">Create</button>
  </form>

  <table>
    <thead>
      <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Description</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let d of departments">
        <td>{{ d.id }}</td>
        <td>{{ d.name }}</td>
        <td>{{ d.description || '—' }}</td>
      </tr>
      <tr *ngIf="departments.length === 0">
        <td colspan="3" style="text-align: center; color: var(--dim);">No departments found.</td>
      </tr>
    </tbody>
  </table>
</div>
