<app-auth-console heading="Log in" subheading="Access the incident console">
  <form (ngSubmit)="submit()">
    <label>
      <span class="field-label">Email</span>
      <input type="email" name="email" autocomplete="email" [(ngModel)]="email" required />
    </label>
    <label>
      <span class="field-label">Password</span>
      <input type="password" name="password" autocomplete="current-password" [(ngModel)]="password" required />
    </label>
    <button type="submit" [disabled]="submitting">{{ submitting ? 'Logging in…' : 'Log in →' }}</button>
  </form>
  <p class="auth-error" role="alert" *ngIf="errorMessage"><span class="dot sev-high"></span>{{ errorMessage }}</p>
  <p class="switch">No account? <a routerLink="/register">Register</a></p>
</app-auth-console>
