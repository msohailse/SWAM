server {
    listen 80;

    # API calls only, kept off /incidents and /tags so those path names stay free
    # for the Angular router's own routes of the same name.
    location /api/ {
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass http://backend:8080;
    }

    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }
}
