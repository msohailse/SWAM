# No REST endpoints, so no HTTP port conflict; consumer + Hibernate wiring only.
quarkus.hibernate-orm.database.generation=none

mp.messaging.incoming.incident-created.topic=incident-created
mp.messaging.incoming.incident-created.connector=smallrye-kafka
mp.messaging.incoming.incident-created.value.deserializer=org.apache.kafka.common.serialization.StringDeserializer
# Start from the beginning of the topic in dev, so a restarted analyzer doesn't miss
# events published before it was up — fine for a prototype, not a durability guarantee.
mp.messaging.incoming.incident-created.auto.offset.reset=earliest

# Reports a duplicate finding back to backend over Kafka, not REST — backend consumes
# this on its own and calls the same IncidentService.markDuplicate(...) a REST endpoint
# used to call directly.
mp.messaging.outgoing.incident-analysis-completed.topic=incident-analysis-completed
mp.messaging.outgoing.incident-analysis-completed.connector=smallrye-kafka
mp.messaging.outgoing.incident-analysis-completed.value.serializer=org.apache.kafka.common.serialization.StringSerializer

# Tests swap the real Kafka connector for SmallRye's in-memory one on this one channel, so
# DuplicateDetectorTest can assert on what got emitted without a real broker.
%test.mp.messaging.outgoing.incident-analysis-completed.connector=smallrye-in-memory

# Dev/test: no datasource/bootstrap-servers configured on purpose — Quarkus Dev Services
# reuses the same throwaway Postgres + Kafka containers api-service's tests spin up.

%prod.quarkus.datasource.db-kind=postgresql
%prod.quarkus.datasource.username=${DB_USER}
%prod.quarkus.datasource.password=${DB_PASSWORD}
%prod.quarkus.datasource.jdbc.url=${DB_URL}
%prod.kafka.bootstrap.servers=${KAFKA_BOOTSTRAP_SERVERS}
