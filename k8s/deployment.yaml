# All SWAM resources live in their own namespace so they never collide by name with
# anything else already running on a shared minikube cluster (learned the hard way —
# an earlier apply without a namespace overwrote an unrelated project's "frontend"
# Deployment/Service that happened to share the same name).
apiVersion: v1
kind: Namespace
metadata:
  name: swam
---
# Same three credentials as deploy/.env.example, just as a Kubernetes Secret instead of
# an env file. Plain stringData (base64-encoded automatically) — good enough for a
# prototype; a real deployment would use a secret manager / sealed-secrets instead.
apiVersion: v1
kind: Secret
metadata:
  name: swam-db-credentials
  namespace: swam
type: Opaque
stringData:
  DB_USER: incident_user
  DB_PASSWORD: change_me
  DB_NAME: incident_db
---
# Plain Deployment, not a StatefulSet — a prototype only needs one Postgres pod, and a
# StatefulSet would add ceremony (headless Service, volumeClaimTemplates) for no benefit
# at this scale. Data lives in emptyDir, so it's gone if the pod is rescheduled — fine
# for a demo, documented as a known limitation (see README).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: swam
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16
          ports:
            - containerPort: 5432
          envFrom:
            - secretRef:
                name: swam-db-credentials
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef: { name: swam-db-credentials, key: DB_USER }
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef: { name: swam-db-credentials, key: DB_PASSWORD }
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef: { name: swam-db-credentials, key: DB_NAME }
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: postgres-data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: swam
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
---
# Same single-broker KRaft config as deploy/docker-compose.yml, just addressed as
# "kafka" (the Service name) instead of the compose service name — everything else
# (topic, listeners) is identical.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kafka
  namespace: swam
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kafka
  template:
    metadata:
      labels:
        app: kafka
    spec:
      containers:
        - name: kafka
          image: apache/kafka:latest
          ports:
            - containerPort: 9092
          env:
            - name: KAFKA_NODE_ID
              value: "1"
            - name: KAFKA_PROCESS_ROLES
              value: broker,controller
            - name: KAFKA_LISTENERS
              value: PLAINTEXT://:9092,CONTROLLER://:9093
            - name: KAFKA_ADVERTISED_LISTENERS
              value: PLAINTEXT://kafka:9092
            - name: KAFKA_CONTROLLER_LISTENER_NAMES
              value: CONTROLLER
            - name: KAFKA_LISTENER_SECURITY_PROTOCOL_MAP
              value: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
            - name: KAFKA_CONTROLLER_QUORUM_VOTERS
              value: 1@kafka:9093
            - name: KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR
              value: "1"
            - name: KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR
              value: "1"
            - name: KAFKA_TRANSACTION_STATE_LOG_MIN_ISR
              value: "1"
            - name: CLUSTER_ID
              value: 4L6g3nShT-eMCtK--X86sw
---
apiVersion: v1
kind: Service
metadata:
  name: kafka
  namespace: swam
spec:
  # Headless (no ClusterIP) on purpose: a single-broker KRaft node connects to itself
  # (controller quorum voter, "kafka:9093") at startup. Through a normal ClusterIP that's
  # a hairpin NAT back to the same pod, which this cluster's networking doesn't reliably
  # support and crash-loops Kafka. Headless makes "kafka" resolve straight to the pod IP,
  # so the self-connection is a plain loopback instead.
  clusterIP: None
  selector:
    app: kafka
  ports:
    - name: broker
      port: 9092
      targetPort: 9092
    - name: controller
      port: 9093
      targetPort: 9093
---
# Backend (api-service). CPU requests/limits are set specifically because the HPA in
# 06-backend-hpa.yaml scales off CPU utilization percentage, which is measured against
# `resources.requests.cpu` — no requests set means no %, means no HPA scaling.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: swam
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: swam-backend:local
          imagePullPolicy: Never # built straight into minikube's docker daemon, no registry
          ports:
            - containerPort: 8080
          env:
            - name: DB_USER
              valueFrom: { secretKeyRef: { name: swam-db-credentials, key: DB_USER } }
            - name: DB_PASSWORD
              valueFrom: { secretKeyRef: { name: swam-db-credentials, key: DB_PASSWORD } }
            - name: DB_NAME
              valueFrom: { secretKeyRef: { name: swam-db-credentials, key: DB_NAME } }
            - name: DB_URL
              value: jdbc:postgresql://postgres:5432/$(DB_NAME)
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: kafka:9092
          resources:
            requests:
              cpu: 200m
              memory: 384Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: swam
spec:
  selector:
    app: backend
  ports:
    - port: 8080
      targetPort: 8080
---
# analyzer_microservice — no REST endpoints, so no Service needed, just a Deployment that
# consumes Kafka and writes duplicate-flag comments straight to Postgres.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: analyzer_microservice
  namespace: swam
spec:
  replicas: 1
  selector:
    matchLabels:
      app: analyzer_microservice
  template:
    metadata:
      labels:
        app: analyzer_microservice
    spec:
      containers:
        - name: analyzer_microservice
          image: swam-analyzer:local
          imagePullPolicy: Never
          env:
            - name: DB_USER
              valueFrom: { secretKeyRef: { name: swam-db-credentials, key: DB_USER } }
            - name: DB_PASSWORD
              valueFrom: { secretKeyRef: { name: swam-db-credentials, key: DB_PASSWORD } }
            - name: DB_NAME
              valueFrom: { secretKeyRef: { name: swam-db-credentials, key: DB_NAME } }
            - name: DB_URL
              value: jdbc:postgresql://postgres:5432/$(DB_NAME)
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: kafka:9092
          resources:
            requests:
              cpu: 100m
              memory: 384Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
# Frontend — nginx.conf inside the image already proxies /incidents, /tags, /users to
# a host named "backend", so this Service is deliberately named "backend" too (matches
# docker-compose's service-discovery-by-name, no nginx.conf changes needed for K8s).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: swam
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: swam-frontend:local
          imagePullPolicy: Never
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: swam
spec:
  type: NodePort
  selector:
    app: frontend
  ports:
    - port: 80
      targetPort: 80
---
# Plain CPU-based HPA (D6 in CLAUDE.md) — not KEDA. Scales the backend Deployment
# between 1 and 5 replicas, targeting 50% average CPU utilization against the
# `resources.requests.cpu: 200m` set in 03-backend.yaml. autoscaling/v2 is what
# `kubectl get hpa` on a modern cluster expects.
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: backend-hpa
  namespace: swam
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: backend
  minReplicas: 1
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 50
