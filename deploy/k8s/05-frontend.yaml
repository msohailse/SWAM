# Frontend — nginx.conf inside the image already proxies /incidents, /tags, /users to
# a host named "backend", so this Service is deliberately named "backend" too (matches
# docker-compose's service-discovery-by-name, no nginx.conf changes needed for K8s).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: swam
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: swam-frontend:local
          imagePullPolicy: Never
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: swam
spec:
  type: NodePort
  selector:
    app: frontend
  ports:
    - port: 80
      targetPort: 80
