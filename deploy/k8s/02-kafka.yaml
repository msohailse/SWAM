# Same single-broker KRaft config as deploy/docker-compose.yml, just addressed as
# "kafka" (the Service name) instead of the compose service name — everything else
# (topic, listeners) is identical.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kafka
  namespace: swam
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kafka
  template:
    metadata:
      labels:
        app: kafka
    spec:
      containers:
        - name: kafka
          image: apache/kafka:latest
          ports:
            - containerPort: 9092
          env:
            - name: KAFKA_NODE_ID
              value: "1"
            - name: KAFKA_PROCESS_ROLES
              value: broker,controller
            - name: KAFKA_LISTENERS
              value: PLAINTEXT://:9092,CONTROLLER://:9093
            - name: KAFKA_ADVERTISED_LISTENERS
              value: PLAINTEXT://kafka:9092
            - name: KAFKA_CONTROLLER_LISTENER_NAMES
              value: CONTROLLER
            - name: KAFKA_LISTENER_SECURITY_PROTOCOL_MAP
              value: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
            - name: KAFKA_CONTROLLER_QUORUM_VOTERS
              value: 1@kafka:9093
            - name: KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR
              value: "1"
            - name: KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR
              value: "1"
            - name: KAFKA_TRANSACTION_STATE_LOG_MIN_ISR
              value: "1"
            - name: CLUSTER_ID
              value: 4L6g3nShT-eMCtK--X86sw
---
apiVersion: v1
kind: Service
metadata:
  name: kafka
  namespace: swam
spec:
  # Headless (no ClusterIP) on purpose: a single-broker KRaft node connects to itself
  # (controller quorum voter, "kafka:9093") at startup. Through a normal ClusterIP that's
  # a hairpin NAT back to the same pod, which this cluster's networking doesn't reliably
  # support and crash-loops Kafka. Headless makes "kafka" resolve straight to the pod IP,
  # so the self-connection is a plain loopback instead.
  clusterIP: None
  selector:
    app: kafka
  ports:
    - name: broker
      port: 9092
      targetPort: 9092
    - name: controller
      port: 9093
      targetPort: 9093
